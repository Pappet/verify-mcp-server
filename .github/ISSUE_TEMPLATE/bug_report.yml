name: 🐛 Bug Report
description: Report a bug or unexpected behavior in verify-mcp-server
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of verify-mcp-server is affected?
      options:
        - MCP Protocol & Tool Calling
        - Verification Checks (AST, Python, Command, Web, etc.)
        - Sandboxing (Podman/Execution)
        - Contract Management & Templates
        - Storage & History
        - Build / CI / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I run a python_type_check with mypy, it fails to parse the output if...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Start verify-mcp-server
        2. Execute the tool `verify_run_contract` with the attached JSON
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: contract-sample
    attributes:
      label: Contract JSON Sample
      description: If applicable, provide the JSON payload of the contract that triggers the bug.
      render: json
      placeholder: |
        {
          "name": "type_check",
          "check_type": { "type": "python_type_check", "paths": ["src/"] }
        }
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: verify-mcp-server Version
      description: Release version or commit hash
      placeholder: "v0.1.0 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Claude Desktop App
        - Cursor / IDE MCP Integration
        - cargo run (from source)
        - Pre-built binary
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant logs or error messages.
      render: shell
    validations:
      required: false