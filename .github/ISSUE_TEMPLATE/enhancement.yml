name: ✨ Enhancement / Feature Request
description: Suggest a new feature or improvement for verify-mcp-server
title: "[Enhancement]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make verify-mcp-server better? We'd love to hear it!

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which area of verify-mcp-server does this relate to?
      options:
        - New Verification Check Type
        - MCP Protocol / Tools
        - Sandboxing & Security
        - Templates & Metavalidation
        - Storage & Analytics
        - Configuration & CLI
        - Build / CI / Deployment
        - Documentation
        - New Component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "Currently, when an agent wants to verify a Node.js project, there is no structural type check comparable to python_type_check..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, links to similar tools, prompt engineering examples, etc.
    validations:
      required: false